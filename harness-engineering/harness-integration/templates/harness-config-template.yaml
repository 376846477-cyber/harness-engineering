# Harness配置文件模板

# Harness平台配置
harness:
  # API地址
  api_url: https://app.harness.io/api
  
  # 认证信息（从环境变量读取）
  api_key: ${HARNESS_API_KEY}
  account_id: ${HARNESS_ACCOUNT_ID}
  organization_id: ${HARNESS_ORG_ID}
  project_id: ${HARNESS_PROJECT_ID}
  
  # 超时配置
  timeout: 300  # 5分钟
  retry: 3      # 重试次数
  
# 流水线配置
pipelines:
  # 代码扫描
  code_scan:
    identifier: code_scan_pipeline
    trigger_on: [push, pr]
    
  # 单元测试
  unit_test:
    identifier: unit_test_pipeline
    trigger_on: [push]
    
  # 集成测试
  integration_test:
    identifier: integration_test_pipeline
    trigger_on: [pr, manual]
    
  # 构建
  build:
    identifier: build_pipeline
    trigger_on: [tag]
    
  # 部署到开发环境
  deploy_dev:
    identifier: deploy_to_dev
    auto_trigger: true
    
  # 部署到测试环境
  deploy_test:
    identifier: deploy_to_test
    auto_trigger: true
    
  # 部署到生产环境
  deploy_prod:
    identifier: deploy_to_prod
    auto_trigger: false
    require_approval: true
    
# 质量门禁配置
quality_gates:
  # 代码覆盖率
  code_coverage:
    enabled: true
    threshold: 80  # 最低覆盖率80%
    strict: true   # 不达标则阻止部署
    
  # 测试通过率
  test_pass_rate:
    enabled: true
    threshold: 95  # 测试通过率95%
    strict: true
    
  # 安全扫描
  security_scan:
    enabled: true
    block_on: [high, critical]  # 高危和严重漏洞阻止部署
    
  # 性能测试
  performance:
    enabled: false
    response_time_ms: 500
    error_rate_threshold: 1
    
# 环境配置
environments:
  - name: dev
    type: development
    auto_deploy: true
    url_prefix: dev.
    
  - name: test
    type: testing
    auto_deploy: true
    url_prefix: test.
    
  - name: prod
    type: production
    auto_deploy: false
    approval_required: true
    url_prefix: www.
    
# 监控配置
monitoring:
  enabled: true
  
  # 性能监控
  performance:
    response_time:
      warning: 300ms
      critical: 500ms
    error_rate:
      warning: 1%
      critical: 5%
      
  # 资源监控
  resources:
    cpu:
      warning: 70%
      critical: 90%
    memory:
      warning: 75%
      critical: 95%
      
  # 告警配置
  alerts:
    channels:
      - type: slack
        webhook: ${SLACK_WEBHOOK}
      - type: email
        recipients: [dev-team@example.com]
    rules:
      - name: high_error_rate
        condition: error_rate > 5%
        severity: critical
      - name: slow_response
        condition: response_time > 500ms
        severity: warning
        
# 分支策略
branch_strategy:
  main:
    deploy: prod
    quality_gate: strict
    
  develop:
    deploy: dev
    quality_gate: normal
    
  feature/*:
    deploy: none
    quality_gate: light
    
  release/*:
    deploy: test
    quality_gate: strict
